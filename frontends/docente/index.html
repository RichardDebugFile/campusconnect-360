<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Docente · CampusConnect 360</title>
  <link rel="stylesheet" href="/common/styles.css" />
</head>
<body>
  <header>
    <h1>📋 Portal Docente / Bienestar</h1>
    <div><span class="role" id="who"></span> <button class="secondary" onclick="Auth.clear();location.reload()">Salir</button></div>
  </header>
  <div class="container" id="app"></div>
  <div id="gate"></div>

  <script src="/common/api.js"></script>
  <script>
    function init() {
      document.getElementById('who').textContent = Auth.name + ' (' + Auth.role + ')';
      document.getElementById('app').innerHTML = `
        <div class="grid">
          <div class="card">
            <h2>Registrar asistencia</h2>
            <label>Estudiante</label><select id="stuA"></select>
            <label>Estado</label>
            <select id="status"><option value="present">Presente</option>
              <option value="absent">Ausente</option><option value="late">Atraso</option></select>
            <label>Nota (opcional)</label><input id="note" />
            <button id="regA">Registrar asistencia</button>
          </div>
          <div class="card">
            <h2>Registrar incidente / novedad</h2>
            <label>Estudiante</label><select id="stuI"></select>
            <label>Tipo</label><input id="type" value="conducta" />
            <label>Severidad</label>
            <select id="sev"><option value="low">Baja</option><option value="medium">Media</option>
              <option value="high">Alta</option></select>
            <label>Descripción</label><input id="desc" />
            <button id="regI" class="danger">Reportar incidente</button>
          </div>
        </div>
        <div class="card" style="margin-top:16px">
          <h2>Registros recientes</h2>
          <div id="recent"><p class="muted">Selecciona un estudiante para ver su historial.</p></div>
        </div>`;
      document.getElementById('regA').onclick = regAsistencia;
      document.getElementById('regI').onclick = regIncidente;
      cargarEstudiantes();
    }

    async function cargarEstudiantes() {
      try {
        const rows = await api('GET', '/academic/students');
        const opts = rows.map(s => `<option value="${s.id}">${s.id} · ${s.first_name} ${s.last_name}</option>`).join('');
        stuA.innerHTML = opts; stuI.innerHTML = opts;
        if (rows[0]) historial(rows[0].id);
        stuA.onchange = () => historial(stuA.value);
      } catch (e) { toast(e.message, 'err'); }
    }

    async function regAsistencia() {
      try {
        await api('POST', '/attendance/attendance', { studentId: stuA.value, status: status.value, note: note.value });
        toast('Asistencia registrada · evento AttendanceRecorded publicado');
        historial(stuA.value);
      } catch (e) { toast(e.message, 'err'); }
    }

    async function regIncidente() {
      try {
        await api('POST', '/attendance/incidents', {
          studentId: stuI.value, type: type.value, severity: sev.value, description: desc.value });
        toast('Incidente reportado · evento IncidentReported publicado');
        historial(stuI.value);
      } catch (e) { toast(e.message, 'err'); }
    }

    async function historial(id) {
      try {
        const a = await api('GET', '/attendance/attendance?studentId=' + id);
        const i = await api('GET', '/attendance/incidents?studentId=' + id);
        document.getElementById('recent').innerHTML = `
          <p class="muted">Estudiante ${id}</p>
          <h2>Asistencia</h2>
          ${a.length ? `<table><thead><tr><th>Estado</th><th>Nota</th><th>Fecha</th></tr></thead>
          <tbody>${a.map(x => `<tr><td>${badge(x.status)}</td><td>${x.note||''}</td>
          <td class="muted">${new Date(x.created_at).toLocaleString()}</td></tr>`).join('')}</tbody></table>`
          : '<p class="muted">Sin asistencia.</p>'}
          <h2 style="margin-top:12px">Incidentes</h2>
          ${i.length ? `<table><thead><tr><th>Tipo</th><th>Severidad</th><th>Descripción</th><th>Fecha</th></tr></thead>
          <tbody>${i.map(x => `<tr><td>${x.type}</td><td>${x.severity}</td><td>${x.description||''}</td>
          <td class="muted">${new Date(x.created_at).toLocaleString()}</td></tr>`).join('')}</tbody></table>`
          : '<p class="muted">Sin incidentes.</p>'}`;
      } catch (e) { toast(e.message, 'err'); }
    }

    renderLogin('gate', 'Portal Docente', 'docente', init);
  </script>
</body>
</html>
