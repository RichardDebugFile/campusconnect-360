<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Académico · CampusConnect 360</title>
  <link rel="stylesheet" href="/common/styles.css" />
</head>
<body>
  <header>
    <h1>Portal Académico / Secretaría</h1>
    <div><span class="role" id="who"></span> <button class="secondary" onclick="Auth.clear();location.reload()">Salir</button></div>
  </header>
  <div class="container" id="app"></div>
  <div id="gate"></div>

  <script src="/common/api.js"></script>
  <script>
    const canRegister = () => ['secretaria', 'admin'].includes(Auth.role);

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;',
      })[char]);
    }

    function init() {
      document.getElementById('gate').innerHTML = '';
      document.getElementById('who').textContent = Auth.name + ' (' + Auth.role + ')';
      document.getElementById('app').innerHTML = `
        <div class="grid">
          <div class="card">
            <h2>Registrar estudiante y matrícula</h2>
            <label>Nombre</label><input id="fn" placeholder="María" />
            <label>Apellido</label><input id="ln" placeholder="Pérez" />
            <label>Curso/Grado</label><input id="gr" value="8vo EGB" />
            <label>Colegio (schoolId)</label><input id="sc" value="SCH-001" />
            <button id="reg" ${canRegister() ? '' : 'disabled'}>Registrar + Matricular</button>
            ${canRegister() ? '' : '<p class="muted">Solo Secretaría o Administración pueden registrar estudiantes.</p>'}
          </div>
          <div class="card">
            <h2>Ficha del estudiante</h2>
            <div id="ficha"><p class="muted">Selecciona un estudiante de la lista.</p></div>
          </div>
        </div>
        <div class="card" style="margin-top:16px">
          <h2>Estudiantes</h2>
          <div id="list"><p class="muted">Cargando...</p></div>
        </div>`;
      document.getElementById('reg').onclick = registrar;
      cargar();
    }

    async function registrar() {
      const button = document.getElementById('reg');
      try {
        const body = {
          firstName: document.getElementById('fn').value.trim(),
          lastName: document.getElementById('ln').value.trim(),
          grade: document.getElementById('gr').value.trim(),
          schoolId: document.getElementById('sc').value.trim(),
        };
        if (Object.values(body).some(value => !value)) {
          throw new Error('Completa todos los campos obligatorios');
        }
        button.disabled = true;
        button.textContent = 'Registrando...';
        const r = await api('POST', '/academic/students', body);
        toast('Estudiante ' + r.student.id + ' matriculado · evento StudentEnrolled publicado');
        document.getElementById('fn').value = '';
        document.getElementById('ln').value = '';
        await cargar();
        await ficha(r.student.id);
      } catch (e) {
        toast(e.message, 'err');
      } finally {
        button.disabled = !canRegister();
        button.textContent = 'Registrar + Matricular';
      }
    }

    async function cargar() {
      const list = document.getElementById('list');
      list.innerHTML = '<p class="muted">Cargando estudiantes...</p>';
      try {
        const rows = await api('GET', '/academic/students');
        list.innerHTML = rows.length ? `
          <table><thead><tr><th>ID</th><th>Nombre</th><th>Grado</th><th>Académico</th><th>Financiero</th><th></th></tr></thead>
          <tbody>${rows.map(s => `
            <tr><td>${escapeHtml(s.id)}</td><td>${escapeHtml(s.first_name)} ${escapeHtml(s.last_name)}</td><td>${escapeHtml(s.grade)}</td>
            <td>${badge(escapeHtml(s.academic_status))}</td><td>${badge(escapeHtml(s.financial_status))}</td>
            <td><button class="secondary" data-student-id="${escapeHtml(s.id)}">Ver ficha</button></td></tr>`).join('')}
          </tbody></table>` : '<p class="muted">Sin estudiantes aún.</p>';
        list.querySelectorAll('[data-student-id]').forEach(button => {
          button.onclick = () => ficha(button.dataset.studentId);
        });
      } catch (e) {
        list.innerHTML = `<p class="muted">No se pudo cargar el listado: ${escapeHtml(e.message)}</p>`;
        toast(e.message, 'err');
      }
    }

    async function ficha(id) {
      const detail = document.getElementById('ficha');
      detail.innerHTML = '<p class="muted">Cargando ficha e historial...</p>';
      try {
        const safeId = encodeURIComponent(id);
        const s = await api('GET', '/academic/students/' + safeId);
        let events = [];
        let eventsError = '';
        try {
          events = await api('GET', '/analytics/students/' + safeId + '/events');
        } catch (e) {
          eventsError = e.message;
        }
        detail.innerHTML = `
          <p><b>${escapeHtml(s.first_name)} ${escapeHtml(s.last_name)}</b> · ${escapeHtml(s.id)}</p>
          <p class="muted">Grado: ${escapeHtml(s.grade)} · Colegio: ${escapeHtml(s.school_id)}</p>
          <p>Estado académico: ${badge(escapeHtml(s.academic_status))} · Financiero: ${badge(escapeHtml(s.financial_status))}</p>
          <h2 style="margin-top:12px">Historial de eventos</h2>
          ${eventsError
            ? `<p class="muted">No se pudo consultar el historial: ${escapeHtml(eventsError)}</p>`
            : events.length ? `<table><thead><tr><th>Evento</th><th>Fecha</th><th>Correlación</th></tr></thead>
          <tbody>${events.map(e => `<tr><td>${escapeHtml(e.event_type)}</td>
          <td>${escapeHtml(new Date(e.occurred_at).toLocaleString())}</td>
          <td class="muted">${escapeHtml((e.correlation_id || '').slice(0, 16))}…</td></tr>`).join('')}</tbody></table>`
          : '<p class="muted">Sin eventos registrados.</p>'}`;
      } catch (e) {
        detail.innerHTML = `<p class="muted">No se pudo cargar la ficha: ${escapeHtml(e.message)}</p>`;
        toast(e.message, 'err');
      }
    }

    renderLogin('gate', 'Portal Académico', 'secretaria', init, ['secretaria', 'admin']);
  </script>
</body>
</html>
